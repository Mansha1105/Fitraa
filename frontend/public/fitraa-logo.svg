<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <title>FITRAA Logo</title>
  <desc>FITRAA fitness app logo — balance pose figure in open circle</desc>

  <!-- Outer ring with breath gap at top -->
  <path d="M100,18 A82,82 0 1,1 99.9,18" fill="none" stroke="#0e0e0e" stroke-width="1.4" stroke-dasharray="514 5" stroke-linecap="round"/>

  <!-- Breath gap dots -->
  <circle cx="97" cy="18.5" r="2" fill="#0e0e0e"/>
  <circle cx="103" cy="18.5" r="2" fill="#0e0e0e"/>

  <!-- Head -->
  <circle cx="100" cy="52" r="9" fill="#0e0e0e"/>

  <!-- Torso -->
  <line x1="100" y1="61" x2="100" y2="106" stroke="#0e0e0e" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Left arm — arcs upward -->
  <path d="M100,78 Q72,63 60,46" fill="none" stroke="#0e0e0e" stroke-width="3" stroke-linecap="round"/>
  <circle cx="60" cy="46" r="3.5" fill="#0e0e0e"/>

  <!-- Right arm — mirrors -->
  <path d="M100,78 Q128,63 140,46" fill="none" stroke="#0e0e0e" stroke-width="3" stroke-linecap="round"/>
  <circle cx="140" cy="46" r="3.5" fill="#0e0e0e"/>

  <!-- Left leg grounded -->
  <path d="M100,106 Q88,124 82,148" fill="none" stroke="#0e0e0e" stroke-width="3" stroke-linecap="round"/>
  <line x1="74" y1="148" x2="90" y2="148" stroke="#0e0e0e" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Right leg folded — tree pose -->
  <path d="M100,106 Q116,118 117,138" fill="none" stroke="#0e0e0e" stroke-width="3" stroke-linecap="round"/>
  <circle cx="107" cy="142" r="3.2" fill="#0e0e0e"/>

  <!-- Ground balance line -->
  <line x1="62" y1="153" x2="138" y2="153" stroke="#0e0e0e" stroke-width="0.7" stroke-linecap="round" opacity="0.3"/>
</svg>
